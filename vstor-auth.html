<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 / 注册 | VSTOR 通行证</title>
    <!-- 引入思源黑体和思源宋体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/vstor-auth.css">
</head>

<body>

    <!-- 极简页眉：只有Logo，强调沉浸感 -->
    <header class="auth-header">
        <a href="vup-archive.html" class="auth-logo">VSTOR</a>
    </header>

    <main class="auth-container">
        <div class="auth-box">

            <h1 class="auth-title">访问学术资源库</h1>

            <!-- 身份选择卡 (DD vs VUP) -->
            <div class="auth-role-tabs" id="roleTabs">
                <button class="role-tab active" data-role="dd">
                    <span class="role-name">独立研究员</span>
                    <span class="role-sub">(DD / 观众)</span>
                </button>
                <button class="role-tab" data-role="vup">
                    <span class="role-name">研究对象 / 作者</span>
                    <span class="role-sub">(VUP / 虚拟主播)</span>
                </button>
            </div>

            <!-- 动作选择卡 (登录 vs 注册) -->
            <div class="auth-action-tabs" id="actionTabs">
                <button class="action-tab active" data-action="login">登录</button>
                <button class="action-tab" data-action="register">注册账号</button>
            </div>

            <div class="auth-forms-wrapper">

                <!-- ================= 1. DD 登录表单 ================= -->
                <form id="form-dd-login" class="auth-form active">
                    <div class="form-group">
                        <label>邮箱或手机号</label>
                        <input name="account" type="text" placeholder="输入您的研究员账号" required>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input name="password" type="password" placeholder="输入密码" required>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox"> 保持登录状态
                        </label>
                        <a href="#" class="forgot-link">忘记密码？</a>
                    </div>
                    <button type="submit" class="auth-btn">作为研究员登录</button>
                </form>

                <!-- ================= 2. VUP 登录表单 ================= -->
                <form id="form-vup-login" class="auth-form">
                    <div class="form-group">
                        <label>VUP 认证邮箱 / 机构代码</label>
                        <input name="account" type="text" placeholder="输入您的官方认证账号" required>
                    </div>
                    <div class="form-group">
                        <label>安全密码</label>
                        <input name="password" type="password" placeholder="输入密码" required>
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox"> 保持登录状态
                        </label>
                        <a href="#" class="forgot-link">忘记密码？</a>
                    </div>
                    <button type="submit" class="auth-btn">进入 VUP 专属控制台</button>
                </form>

                <!-- ================= 3. DD 注册表单 ================= -->
                <<!-- 以 DD 注册表单为例，其他三个表单也照此办理 -->
                    <form id="form-dd-register" class="auth-form">
                        <div class="form-row">
                            <div class="form-group half">
                                <label>昵称 (笔名)</label>
                                <!-- 加上 name="nickname" -->
                                <input name="nickname" type="text" placeholder="例如：单推人小明" required>
                            </div>
                            <div class="form-group half">
                                <label>B站 UID (选填)</label>
                                <!-- 加上 name="biliuid" -->
                                <input name="biliuid" type="text" placeholder="用于验证成分">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>主要研究方向</label>
                            <!-- 加上 name="direction" -->
                            <select name="direction" class="auth-select">
                                <option value="data">粉丝经济与数据分析</option>
                                <option value="data">混日子</option>
                                <!-- ... 其他选项 ... -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label>电子邮箱</label>
                            <!-- 加上 name="email" -->
                            <input name="email" type="email" placeholder="用于接收通知" required>
                        </div>
                        <div class="form-group">
                            <label>设置密码</label>
                            <!-- 加上 name="password" -->
                            <input name="password" type="password" required>
                        </div>
                        <button type="submit" class="auth-btn">创建研究员账号</button>
                    </form>

                    <!-- 同样的，在登录表单里 -->
                    <!-- 账号框加上 name="account" -->
                    <!-- 密码框加上 name="password" -->

                    <!-- ================= 4. VUP 注册表单 ================= -->
                    <form id="form-vup-register" class="auth-form">
                        <div class="form-group">
                            <label>虚拟主播名称 (VUP Name)</label>
                            <input name="nickname" type="text" placeholder="您的官方活动名称" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group half">
                                <label>所属机构 (Affiliation)</label>
                                <input name="affiliation" type="text" placeholder="企业势填公会/公司，个人势填无">
                            </div>
                            <div class="form-group half">
                                <label>主推平台</label>
                                <select name="platform" class="auth-select">
                                    <option>Bilibili</option>
                                    <option>YouTube</option>
                                    <option>Twitch</option>
                                    <option>其他</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>机构/认证邮箱</label>
                            <input name="email" type="email" placeholder="需使用工作邮箱以获取认证标识" required>
                        </div>
                        <div class="form-group">
                            <label>设置密码</label>
                            <input name="password" type="password" required>
                        </div>
                        <p class="form-hint">注：注册成为 VUP 作者后，您将认领以您为研究对象的相关文献，并可发表声明。</p>
                        <button type="submit" class="auth-btn">申请 VUP 认证注册</button>
                    </form>

            </div>

            <div class="auth-footer-text">
                点击按钮即表示您同意 VSTOR 的 <a href="#">服务条款</a> 和 <a href="#">隐私政策（开源版）</a>。
            </div>
        </div>
    </main>

    <script src="js/vstor-auth.js"></script>
    <script src="js/vstor-bili-bridge.js"></script>
</body>

</html>
