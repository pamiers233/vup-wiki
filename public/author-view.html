<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>学者档案 | VSTOR</title>
    <link rel="stylesheet" href="css/academic-minimal.css">
    <link rel="stylesheet" href="css/vstor-author.css"> <!-- 新建CSS -->
</head>

<body class="author-page-bg">

    <nav class="v-navbar">
        <div class="v-nav-container">
            <div class="v-brand"><a href="vup-archive.html">VSTOR</a></div>
            <a href="vup-archive.html" class="v-btn v-btn-text">返回检索首页</a>
        </div>
    </nav>

    <!-- 沉浸式顶部：头像与核心信息 -->
    <header class="author-hero-section">
        <div class="author-hero-container">
            <div class="author-avatar-big" id="authorAvatar"></div>

            <div class="author-info-main">
                <div class="author-name-row">
                    <h1 id="authorName">加载中...</h1>
                    <span id="authorLevel" class="scholar-badge">LV.1</span>
                </div>

                <p class="author-bio" id="authorBio">正在调取学术档案...</p>

                <div class="author-stats-container">
                    <div class="stat-item">
                        <b id="paperCount">0</b>
                        <span class="stat-label">Publications</span>
                    </div>
                    <div class="stat-item">
                        <b>100%</b>
                        <span class="stat-label">Open Access</span>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- 主体：作品列表 -->
    <main class="author-content-container">
        <section class="author-works">
            <h2 class="section-title-line">Selected Publications</h2>
            <div id="authorPapersList" class="works-list-container">
                <!-- 由JS填充 -->
                <div style="text-align: center; color: #888; padding: 40px;">加载中...</div>
            </div>
        </section>
    </main>

    <script src="js/vstor-author-view.js"></script> <!-- 新建JS -->
</body>

</html>
