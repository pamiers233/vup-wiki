<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级检索 (Advanced Search) | VSTOR</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/academic-minimal.css">
    <style>
        .search-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 40px;
        }

        /* 左侧筛选侧栏 */
        .search-sidebar {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #eee;
            align-self: start;
        }

        .filter-group {
            margin-bottom: 25px;
        }

        .filter-group h3 {
            font-size: 1rem;
            color: #333;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #ddd;
        }

        .filter-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: #555;
            cursor: pointer;
        }

        .filter-item input {
            margin-right: 8px;
        }

        /* 顶部主搜索框 */
        .search-header {
            grid-column: 1 / -1;
            background: #0b1120;
            padding: 40px 20px;
            border-radius: 12px;
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }

        .search-bar-mega {
            display: flex;
            max-width: 800px;
            margin: 20px auto 0;
            background: white;
            border-radius: 30px;
            padding: 5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .search-bar-mega input {
            flex: 1;
            border: none;
            padding: 15px 25px;
            font-size: 1.1rem;
            border-radius: 30px;
            outline: none;
        }

        .search-bar-mega button {
            background: #1a237e;
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-bar-mega button:hover {
            background: #0d47a1;
        }

        /* 搜索结果区 */
        .search-results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #1a237e;
        }

        .result-count {
            font-size: 1.1rem;
            color: #333;
            font-weight: bold;
        }

        .sort-select {
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #ddd;
            font-size: 0.9rem;
            outline: none;
            background: white;
        }

        /* 超高端搜索卡片样式 */
        .paper-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            gap: 25px;
            align-items: flex-start;
            position: relative;
            overflow: hidden;
        }

        .paper-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 4px;
            height: 100%;
            background: #1a237e;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .paper-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.08);
            border-color: #d0d7e6;
        }

        .paper-card:hover::before {
            opacity: 1;
        }

        .paper-author-col {
            flex: 0 0 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .author-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a237e, #3949ab);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-family: var(--font-serif);
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(26, 35, 126, 0.2);
            object-fit: cover;
            border: 2px solid white;
        }

        .author-level {
            margin-top: 8px;
            font-size: 0.75rem;
            background: #f0f4f8;
            color: #1a237e;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        .paper-content-col {
            flex: 1;
        }

        .paper-title {
            margin: 0 0 10px 0;
            font-size: 1.35rem;
            line-height: 1.4;
        }

        .paper-title a {
            color: #111827;
            text-decoration: none;
            font-family: var(--font-serif);
            transition: color 0.2s;
        }

        .paper-title a:hover {
            color: #1a237e;
        }

        .paper-meta {
            font-size: 0.85rem;
            color: #6b7280;
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-top: 1px solid #f3f4f6;
            padding-top: 12px;
        }

        .meta-stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .vup-tag {
            background: #fff3e0;
            color: #e65100;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-block;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #6b7280;
            background: #f9fafb;
            border-radius: 12px;
            border: 1px dashed #d1d5db;
        }
    </style>
</head>

<body>
    <nav class="v-navbar">
        <div class="v-nav-container">
            <div class="v-brand"><a href="vup-archive.html">VSTOR</a></div>
            <ul class="v-nav-links">
                <li><a href="vup-archive.html">探索文献</a></li>
                <li><a href="vstor-search.html" class="active">高级检索</a></li>
                <li><a href="vstor-collections.html">期刊专栏</a></li>
                <li><a href="vstor-metrics.html">学术指标</a></li>
                <li><a href="vstor-editorial.html">编委会</a></li>
                <li><a href="vstor-guidelines.html">作者须知</a></li>
            </ul>
        </div>
    </nav>

    <div class="search-container">

        <!-- 顶部搜索 -->
        <div class="search-header">
            <h1 style="font-family: var(--font-serif); font-size: 2rem;">高级学术检索系统</h1>
            <p style="color: #aaa; margin-top: 10px;">VSTOR Advanced Academic Database Search</p>
            <form class="search-bar-mega" id="searchForm">
                <input type="text" id="searchInput" placeholder="检索论文标题、作者名或研究对象(VUP名称)...">
                <button type="submit">搜索</button>
            </form>
        </div>

        <!-- 左侧过滤器 -->
        <aside class="search-sidebar">
            <div class="filter-group">
                <h3>文献状态</h3>
                <label class="filter-item">
                    <input type="radio" name="status" value="published" checked> 仅已发表正刊
                </label>
                <label class="filter-item">
                    <input type="radio" name="status" value="all"> 包含同行评审中 (Pre-prints)
                </label>
            </div>

            <div class="filter-group">
                <h3>出版年份</h3>
                <label class="filter-item"><input type="checkbox" name="year" value="2026" checked> 2026 卷</label>
                <label class="filter-item"><input type="checkbox" name="year" value="2025"> 2025 卷</label>
            </div>

            <!-- 未来可以做成动态获取 VUP 列表 -->
            <div class="filter-group">
                <h3>热门研究对象 (VUP)</h3>
                <label class="filter-item"><input type="checkbox" name="vup" value="嘉然"> 嘉然 Diana</label>
                <label class="filter-item"><input type="checkbox" name="vup" value="星瞳"> 星瞳</label>
                <label class="filter-item"><input type="checkbox" name="vup" value="阿梓"> 阿梓</label>
            </div>

            <button type="button" class="v-btn v-btn-primary" style="width: 100%"
                onclick="executeSearch()">应用筛选</button>
        </aside>

        <!-- 右侧结果 -->
        <main class="search-results">
            <div class="search-results-header">
                <div class="result-count">共检索到 <span id="resultTotal" style="color:#1a237e">0</span> 篇文献</div>
                <select class="sort-select" id="sortSelect" onchange="executeSearch()">
                    <option value="relevance">按相关度排序</option>
                    <option value="newest">按最新收录排序</option>
                    <option value="likes">按引用量(点赞数)降序</option>
                </select>
            </div>

            <div id="resultsContainer">
                <div class="empty-state">
                    <h3>请输入检索词开始搜索</h3>
                    <p>支持多关键词、作者及 VUP 交叉检索</p>
                </div>
            </div>
        </main>

    </div>

    <!-- 前端交互逻辑 -->
    <script>
        document.getElementById('searchForm').addEventListener('submit', (e) => {
            e.preventDefault();
            executeSearch();
        });

        async function executeSearch() {
            const q = document.getElementById('searchInput').value.trim();
            const sort = document.getElementById('sortSelect').value;
            const status = document.querySelector('input[name="status"]:checked').value;

            const resultsContainer = document.getElementById('resultsContainer');
            resultsContainer.innerHTML = '<div class="empty-state">正在高强度调取数据库...</div>';

            try {
                // 调用将要在后端实现的高级搜索接口
                const res = await fetch(`/api/search/advanced?q=${encodeURIComponent(q)}&sort=${sort}&status=${status}`);
                const data = await res.json();

                if (data.success) {
                    document.getElementById('resultTotal').innerText = data.papers.length;
                    renderResults(data.papers);
                } else {
                    resultsContainer.innerHTML = '<div class="empty-state">检索失败，请检查服务器连接。</div>';
                }
            } catch (err) {
                console.error(err);
                resultsContainer.innerHTML = '<div class="empty-state">网络错误或服务器未启动。</div>';
            }
        }

        function renderResults(papers) {
            const container = document.getElementById('resultsContainer');
            if (papers.length === 0) {
                container.innerHTML = `<div class="empty-state">
                    <h3>未找到符合条件的文献</h3>
                    <p>请尝试减少关键词或放宽筛选条件，或自己动手写一篇！</p>
                </div>`;
                return;
            }

            container.innerHTML = papers.map(p => {
                const authorName = p.author || p.authors || '未知学者';
                const initial = authorName.charAt(0).toUpperCase();

                // 头像处理
                let avatarHtml = `<div class="author-avatar">${initial}</div>`;
                if (p.authorAvatar) {
                    avatarHtml = `<img src="${p.authorAvatar}" class="author-avatar" alt="${authorName}">`;
                }

                // 摘要处理
                const abstractText = p.abstract || p.feedback || "暂无摘要。请点击查阅原文深造。";

                return `
                <div class="paper-card">
                    <!-- 左侧：作者头像列 -->
                    <div class="paper-author-col">
                        <a href="author-view.html?name=${encodeURIComponent(authorName)}" title="查看 ${authorName} 的学术主页">
                            ${avatarHtml}
                        </a>
                        <div class="author-level">LV.${p.authorLevel || 1}</div>
                    </div>
                    
                    <!-- 右侧：文献信息列 -->
                    <div class="paper-content-col">
                        <h3 class="paper-title">
                            <a href="paper-view.html?id=${p.id}">${p.title}</a>
                        </h3>
                        
                        <div style="margin-bottom: 12px; font-size: 0.95rem;">
                            <span style="color: #4b5563;">
                                <strong>作者：</strong> <a href="author-view.html?name=${encodeURIComponent(authorName)}" style="color: #2b528a; text-decoration: none; font-weight: 500;">${authorName}</a>
                            </span>
                            ${p.vup ? `<span style="margin-left: 20px;"><strong>研究对象：</strong> <span class="vup-tag">${p.vup}</span></span>` : ''}
                        </div>
                        
                        <p style="font-size: 0.95rem; color: #4b5563; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin: 0;">
                            ${abstractText}
                        </p>
                        
                        <div class="paper-meta">
                            <div class="meta-stat">
                                <span>📚 VSTOR ${new Date().getFullYear()}</span>
                            </div>
                            <div class="meta-stat">
                                <span>被引 (Likes): <strong style="color: #e53e3e; font-size: 1rem;">${p.likes || 0}</strong></span>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // 如果是从其他页面带参数跳转过来的，自动搜索
        const urlParams = new URLSearchParams(window.location.search);
        const query = urlParams.get('q');
        if (query) {
            document.getElementById('searchInput').value = query;
            executeSearch();
        }
    </script>
</body>

</html>
