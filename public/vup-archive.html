<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VSTOR | VUP与虚拟主播学术资源库</title>
    <!-- 引入思源黑体和思源宋体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/academic-minimal.css">
    <link rel="stylesheet" href="css/vstor-dashboard.css">
    <link rel="stylesheet" href="css/vstor-likes.css">
</head>

<body>

    <body>

        <!-- 导航栏 -->
        <nav class="v-navbar">
            <div class="v-nav-container">
                <div class="v-brand"><a href="index.html">VSTOR</a></div>
                <ul class="v-nav-links">
                    <li><a href="vup-archive.html" class="active">探索文献</a></li>
                    <li><a href="vstor-search.html">高级检索</a></li>
                    <li><a href="vstor-collections.html">期刊专栏</a></li>
                    <li><a href="vstor-metrics.html">学术指标</a></li>
                    <li><a href="vstor-editorial.html">编委会</a></li>
                    <li><a href="vstor-guidelines.html">作者须知</a></li>
                </ul>

                <!-- 动态权限区：未登录显示按钮，已登录显示头像 -->
                <div class="v-nav-actions" id="authArea">
                    <!-- 骨架屏/加载中状态 -->
                    <span id="authLoading" class="text-muted">加载中...</span>

                    <!-- 未登录状态 (默认隐藏) -->
                    <a href="vstor-auth.html" class="v-btn v-btn-outline hidden" id="loginBtn">注册 / 登录</a>

                    <!-- 已登录状态 (默认隐藏) -->
                    <div class="v-user-menu hidden" id="userMenu">
                        <button class="v-user-btn" id="userBtnToggle">
                            <span class="v-avatar" id="navAvatar">?</span>
                            <span class="v-username" id="navUsername">学者</span>
                            <span class="v-arrow">▼</span>
                        </button>
                        <div class="v-dropdown" id="userDropdown">
                            <div class="v-dropdown-header">
                                <span class="role-badge" id="navRoleBadge">研究员</span>
                            </div>
                            <a href="#" class="v-dropdown-item" id="navDashboardLink">进入操作平台</a>
                            <div class="v-dropdown-divider"></div>
                            <a href="#" class="v-dropdown-item text-red" id="logoutBtn">退出登录</a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>

        <!-- 核心搜索区 -->
        <header class="v-hero">
            <div class="v-hero-content">
                <!-- 动态标题与副标题 -->
                <h1 class="v-hero-title" id="heroTitle">加载学术宇宙...</h1>
                <p class="v-hero-subtitle" id="heroSubtitle">正在连接 VSTOR 数据库...</p>

                <form class="v-search-form" id="searchForm">
                    <input type="text" id="searchInput" class="v-search-input" placeholder="搜索论文、作者、VUP名称或研究关键词...">
                    <button type="submit" class="v-btn v-btn-primary v-search-btn">搜索</button>
                </form>

                <!-- 动态热门搜索 -->
                <div class="v-search-tips" id="hotSearches">
                    <span>热门检索：</span>
                    <!-- JS 会在这里插入 <a href="#"># 关键词</a> -->
                </div>
            </div>
        </header>

        <!-- 论文列表区 -->
        <main class="v-main-content">
            <h2 class="v-section-title">最新收录 / Recent Publications</h2>

            <!-- 动态论文容器 -->
            <div class="v-paper-list" id="paperListContainer">
                <!-- 加载提示：保持学术风的克制 -->
                <div class="v-loading-text">正在从远端检索最新野生文献...</div>
            </div>
        </main>

        <footer class="v-footer">
            <!-- 保持不变 -->
            <div class="v-footer-content">
                <div class="v-footer-brand">VSTOR</div>
                <p>为爱学习的DD与学术V提供开源文献检索服务。一切学术内容均为爱好者“野生”创作。</p>
                <p>&copy; 2026 VSTOR. 本站为开源项目。</p>
            </div>
        </footer>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
        <script src="js/vup-behavior.js"></script>
        <script src="js/vstor-search-engine.js"></script>
        <script src="js/vstor-likes-system.js"></script>
    </body>

</html>
