<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学术指标与影响力榜单 (Metrics) | VSTOR</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/academic-minimal.css">
    <style>
        .metrics-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .metrics-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .metrics-header h1 {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            color: #1a237e;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        .metric-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            position: relative;
            overflow: hidden;
        }

        .metric-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #1a237e, #4fc3f7);
        }

        .metric-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .metric-title span {
            background: #e8eaf6;
            color: #1a237e;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-left: 10px;
        }

        .rank-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .rank-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #eee;
        }

        .rank-item:last-child {
            border-bottom: none;
        }

        .rank-num {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ccc;
            width: 30px;
            text-align: center;
        }

        .rank-item:nth-child(1) .rank-num {
            color: #f4b400;
            font-size: 1.5rem;
        }

        /* 金 */
        .rank-item:nth-child(2) .rank-num {
            color: #9e9e9e;
            font-size: 1.4rem;
        }

        /* 银 */
        .rank-item:nth-child(3) .rank-num {
            color: #cf8e6d;
            font-size: 1.3rem;
        }

        /* 铜 */

        .rank-content {
            flex: 1;
            margin-left: 15px;
        }

        .rank-name {
            font-weight: bold;
            color: #222;
        }

        .rank-name a {
            color: inherit;
            text-decoration: none;
        }

        .rank-name a:hover {
            color: #1a237e;
            text-decoration: underline;
        }

        .rank-score {
            font-size: 0.9rem;
            color: #e53935;
            font-weight: bold;
        }

        .loading-state {
            text-align: center;
            padding: 40px;
            color: #888;
            grid-column: 1 / -1;
        }
    </style>
</head>

<body>
    <nav class="v-navbar">
        <div class="v-nav-container">
            <div class="v-brand"><a href="vup-archive.html">VSTOR</a></div>
            <ul class="v-nav-links">
                <li><a href="vup-archive.html">探索文献</a></li>
                <li><a href="vstor-search.html">高级检索</a></li>
                <li><a href="vstor-collections.html">期刊专栏</a></li>
                <li><a href="vstor-metrics.html" class="active">学术指标</a></li>
                <li><a href="vstor-editorial.html">编委会</a></li>
                <li><a href="vstor-guidelines.html">作者须知</a></li>
            </ul>
        </div>
    </nav>

    <main class="metrics-container">
        <div class="metrics-header">
            <h1>全球 VUP 学术影响力指标</h1>
            <p style="color: #666; margin-top: 10px;">VSTOR Global Virtual Academic Metrics (VGAM) 2026</p>
        </div>

        <div class="metrics-grid" id="metricsGrid">
            <div class="loading-state">正在计算各项指标权重，请稍候...</div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/metrics');
                const data = await res.json();

                if (data.success) {
                    renderMetrics(data);
                }
            } catch (err) {
                document.getElementById('metricsGrid').innerHTML = '<div class="loading-state">无法连接到数据库服务器，无法渲染榜单。</div>';
            }
        });

        function renderMetrics(data) {
            const grid = document.getElementById('metricsGrid');

            // 1. 高引文献榜 (Top Papers)
            const topPapers = data.topPapers.slice(0, 10).map((p, i) => `
                <li class="rank-item">
                    <div class="rank-num">${i + 1}</div>
                    <div class="rank-content">
                        <div class="rank-name"><a href="paper-view.html?id=${p.id}">${p.title}</a></div>
                        <div style="font-size: 0.8rem; color: #777;">作者: ${p.authors}</div>
                    </div>
                    <div class="rank-score">${p.likes || 0} 被引</div>
                </li>
            `).join('');

            // 2. 高频研究对象榜 (Top VUPs)
            const topVups = data.topVups.slice(0, 10).map((v, i) => `
                <li class="rank-item">
                    <div class="rank-num">${i + 1}</div>
                    <div class="rank-content">
                        <div class="rank-name"><a href="vstor-search.html?q=${encodeURIComponent(v.name)}">${v.name}</a></div>
                    </div>
                    <div class="rank-score" style="color:#1976d2">${v.count} 篇相关论著</div>
                </li>
            `).join('');

            // 3. 高产学者榜 (Top Authors)
            const topAuthors = data.topAuthors.slice(0, 10).map((a, i) => `
                <li class="rank-item">
                    <div class="rank-num">${i + 1}</div>
                    <div class="rank-content">
                        <div class="rank-name"><a href="author-view.html?name=${encodeURIComponent(a.name)}">${a.name}</a></div>
                        <div style="font-size: 0.8rem; color: #777;">LV.${a.level} | 贡献值：${a.contribution}</div>
                    </div>
                    <div class="rank-score" style="color:#388e3c">${a.count} 篇成果</div>
                </li>
            `).join('');

            grid.innerHTML = `
                <div class="metric-card">
                    <div class="metric-title">高引文献榜 <span>Citation Metrics</span></div>
                    <ul class="rank-list">${topPapers || '<li class="rank-item"><div class="rank-content"><div class="rank-name" style="color:#aaa;">暂无数据</div></div></li>'}</ul>
                </div>
                
                <div class="metric-card">
                    <div class="metric-title">热门研究对象 (VUP) <span>Research Hotspots</span></div>
                    <ul class="rank-list">${topVups || '<li class="rank-item"><div class="rank-content"><div class="rank-name" style="color:#aaa;">暂无数据</div></div></li>'}</ul>
                </div>

                <div class="metric-card">
                    <div class="metric-title">高产出独立研究员 <span>Prolific Authors</span></div>
                    <ul class="rank-list">${topAuthors || '<li class="rank-item"><div class="rank-content"><div class="rank-name" style="color:#aaa;">暂无数据</div></div></li>'}</ul>
                </div>
            `;
        }
    </script>
</body>

</html>
